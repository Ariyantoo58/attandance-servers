syntax = "proto3";

package face_recognition;

service FaceRecognitionService {
  rpc RegisterFace (RegisterRequest) returns (RegisterResponse);
  rpc RecognizeFace (RecognizeRequest) returns (RecognizeResponse);
  rpc DeleteFace (DeleteRequest) returns (DeleteResponse);
  rpc GetFaceStatus (StatusRequest) returns (StatusResponse);
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

message StatusRequest {
  string id = 1;
}

message StatusResponse {
  bool registered = 1;
  string message = 2;
}

message RegisterRequest {
  string id = 1;
  bytes image_data = 2;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
}

message RecognizeRequest {
  bytes image_data = 2;
}

message RecognizeResponse {
  bool recognized = 1;
  string id = 2;
  double confidence = 3;
  string message = 4;
}
